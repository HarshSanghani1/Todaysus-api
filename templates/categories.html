{% extends "base.html" %}
{% block title %}Categories{% endblock %}
{% block page_title %}Categories{% endblock %}

{% block topbar_actions %}
<button class="btn btn-primary" onclick="openModal()"><i class="ri-add-line"></i> New Category</button>
{% endblock %}

{% block content %}
<div class="card" style="box-shadow: 0 8px 30px rgba(0,0,0,0.15);">
    <div style="overflow-x:auto;">
        <table class="data-table">
            <thead><tr>
                <th style="width:20%">Name</th>
                <th style="width:18%">Slug</th>
                <th style="width:28%">Description</th>
                <th style="width:8%">Order</th>
                <th style="width:10%">Status</th>
                <th style="width:80px">Actions</th>
            </tr></thead>
            <tbody id="cat-body"><tr><td colspan="6" class="empty-state">Loading...</td></tr></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="cat-modal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="cat-title">New Category</h3>
            <button class="modal-close" onclick="closeM()">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="cat-id">
            <div class="form-group"><label>Name *</label><input class="form-control" id="cat-name" placeholder="e.g. Technology"></div>
            <div class="form-group"><label>Description</label><textarea class="form-control" id="cat-desc" rows="2"></textarea></div>
            <div class="form-row">
                <div class="form-group"><label>SEO Title</label><input class="form-control" id="cat-seo"></div>
                <div class="form-group"><label>Order</label><input type="number" class="form-control" id="cat-order" value="0"></div>
            </div>
            <div class="form-group"><label>SEO Description</label><textarea class="form-control" id="cat-seod" rows="2"></textarea></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeM()">Cancel</button>
            <button class="btn btn-primary" onclick="save()"><i class="ri-save-line"></i> Save</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let cats = [];
async function load() {
    try {
        cats = await apiCall('/api/v1/admin/categories');
        const b = document.getElementById('cat-body');
        if (!cats.length) { b.innerHTML = '<tr><td colspan="6" class="empty-state">No categories</td></tr>'; return; }
        b.innerHTML = cats.map((c,i) => `<tr>
            <td>${esc(c.name)}</td>
            <td style="font-family:monospace;font-size:.76rem;color:var(--outline)">${esc(c.slug)}</td>
            <td><div class="truncate" style="color:var(--outline)">${esc(c.description) || '—'}</div></td>
            <td>${c.order ?? 0}</td>
            <td><span class="badge badge-${c.is_active !== false ? 'success' : 'danger'}">${c.is_active !== false ? 'Active' : 'Inactive'}</span></td>
            <td><div class="action-btns">
                <button class="action-btn" onclick="edit(${i})"><i class="ri-pencil-line"></i></button>
                <button class="action-btn delete" onclick="del('${c._id}')"><i class="ri-delete-bin-line"></i></button>
            </div></td>
        </tr>`).join('');
    } catch(e) { showToast(e.message, 'error'); }
}

function openModal() { document.getElementById('cat-title').textContent='New Category'; document.getElementById('cat-id').value=''; document.getElementById('cat-name').value=''; document.getElementById('cat-desc').value=''; document.getElementById('cat-seo').value=''; document.getElementById('cat-seod').value=''; document.getElementById('cat-order').value='0'; document.getElementById('cat-modal').classList.add('active'); }

function edit(i) { const c=cats[i]; if(!c)return; document.getElementById('cat-title').textContent='Edit Category'; document.getElementById('cat-id').value=c._id; document.getElementById('cat-name').value=c.name||''; document.getElementById('cat-desc').value=c.description||''; document.getElementById('cat-seo').value=c.seo_title||''; document.getElementById('cat-seod').value=c.seo_description||''; document.getElementById('cat-order').value=c.order||0; document.getElementById('cat-modal').classList.add('active'); }

async function save() {
    const id=document.getElementById('cat-id').value;
    const body={name:document.getElementById('cat-name').value, description:document.getElementById('cat-desc').value, seo_title:document.getElementById('cat-seo').value, seo_description:document.getElementById('cat-seod').value, order:parseInt(document.getElementById('cat-order').value)||0};
    try { if(id){await apiCall('/api/v1/admin/categories/'+id,'PUT',body);showToast('Updated');} else{await apiCall('/api/v1/admin/categories','POST',body);showToast('Created');} closeM();load(); } catch(e){showToast(e.message,'error');}
}

async function del(id) { if(!confirm('Delete?'))return; try{await apiCall('/api/v1/admin/categories/'+id,'DELETE');showToast('Deleted');load();}catch(e){showToast(e.message,'error');} }
function closeM() { document.getElementById('cat-modal').classList.remove('active'); }
load();
</script>
{% endblock %}
